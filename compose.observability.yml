services:
  langfuse-web:
    container_name: sentinel-langfuse-web
    image: langfuse/langfuse:3
    ports:
      - "3001:3000"
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse"
      NEXTAUTH_SECRET: "${LANGFUSE_NEXTAUTH_SECRET}"
      SALT: "${LANGFUSE_SALT}"
      ENCRYPTION_KEY: "${LANGFUSE_ENCRYPTION_KEY}"
      NEXTAUTH_URL: "http://localhost:3001"
      LANGFUSE_INIT_USER_EMAIL: "admin@example.com"
      LANGFUSE_INIT_USER_PASSWORD: "admin123"
      LANGFUSE_INIT_USER_NAME: "Admin"
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: "langfuse"
      LANGFUSE_S3_EVENT_UPLOAD_REGION: "auto"
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: "http://langfuse-minio:9000"
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: "${LANGFUSE_MINIO_ACCESS}"
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: "${LANGFUSE_MINIO_SECRET}"
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      REDIS_CONNECTION_STRING: "redis://:${LANGFUSE_REDIS_PASSWORD}@langfuse-redis:6379/0"
      CLICKHOUSE_URL: "http://clickhouse:8123"
      CLICKHOUSE_MIGRATION_URL: "clickhouse://langfuse:langfuse@clickhouse:9000"
    healthcheck:
      test: >-
        curl -sf http://localhost:3000/api/public/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - sentinel-net

  langfuse-worker:
    container_name: sentinel-langfuse-worker
    image: langfuse/langfuse-worker:3
    ports:
      - "3030:3030"
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse"
      SALT: "${LANGFUSE_SALT}"
      ENCRYPTION_KEY: "${LANGFUSE_ENCRYPTION_KEY}"
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: "langfuse"
      LANGFUSE_S3_EVENT_UPLOAD_REGION: "auto"
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: "http://langfuse-minio:9000"
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: "${LANGFUSE_MINIO_ACCESS}"
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: "${LANGFUSE_MINIO_SECRET}"
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      REDIS_CONNECTION_STRING: "redis://:${LANGFUSE_REDIS_PASSWORD}@langfuse-redis:6379/0"
      CLICKHOUSE_URL: "http://clickhouse:8123"
      CLICKHOUSE_MIGRATION_URL: "clickhouse://langfuse:langfuse@clickhouse:9000"
    networks:
      - sentinel-net

  langfuse-postgres:
    container_name: sentinel-langfuse-pg
    image: postgres:17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - lf_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
      - sentinel-net

  langfuse-redis:
    container_name: sentinel-langfuse-redis
    image: redis:7
    ports:
      - "6380:6379"
    command: >-
      redis-server --requirepass ${LANGFUSE_REDIS_PASSWORD}
    healthcheck:
      test: >-
        redis-cli -a ${LANGFUSE_REDIS_PASSWORD} ping | grep -q PONG
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - sentinel-net

  langfuse-minio:
    container_name: sentinel-langfuse-minio
    image: minio/minio
    ports:
      - "9090:9000"
      - "9091:9001"
    environment:
      MINIO_ROOT_USER: "${LANGFUSE_MINIO_ACCESS}"
      MINIO_ROOT_PASSWORD: "${LANGFUSE_MINIO_SECRET}"
    command: server /data --console-address ":9001"
    volumes:
      - lf_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - sentinel-net

  clickhouse:
    container_name: sentinel-clickhouse
    image: clickhouse/clickhouse-server:24.8-alpine
    environment:
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse
    volumes:
      - ch_data:/var/lib/clickhouse
    healthcheck:
      test: >-
        clickhouse-client --query "SELECT 1" || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - sentinel-net

volumes:
  lf_pg_data:
  lf_minio_data:
  ch_data:

networks:
  sentinel-net:
    external: true
    name: arxiv-sentinel_sentinel-net
